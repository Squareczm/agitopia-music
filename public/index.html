<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James — Music</title>
<meta name="description" content="James 的个人音乐作品">
<meta property="og:title" content="James — Music">
<meta property="og:image" content="/avatar.png">
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-noise"></div>

<section class="hero">
  <div class="hero-bg">
    <div class="hero-bg-overlay"></div>
  </div>
  <div class="hero-content">
    <div class="hero-avatar">
      <img src="/avatar.png" alt="James" width="80" height="145">
    </div>
    <h1 class="hero-name">James</h1>
    <p class="hero-statement">在代码与旋律之间，找到属于碳基生命的温度。</p>
    <div class="hero-scroll">
      <svg viewBox="0 0 24 24" width="18" height="18">
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="1.2"/>
        <polyline points="7,14 12,19 17,14" stroke="currentColor" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
  </div>
</section>

<div class="container">

<main id="song-list">
  <div class="loading">Loading...</div>
</main>

<footer class="footer">
  <div class="footer-line"></div>
</footer>

</div>

<template id="song-template">
  <article class="song" data-index="">
    <div class="song-number"></div>
    <div class="song-body">
      <div class="song-header">
        <div class="song-title-group">
          <h2 class="song-title"></h2>
          <span class="song-style"></span>
        </div>
      </div>
      <p class="song-desc"></p>

      <div class="player" data-audio-url="">
        <button class="player-play" aria-label="播放">
          <svg class="player-icon-play" viewBox="0 0 24 24" width="20" height="20">
            <polygon points="6,3 20,12 6,21" fill="currentColor"/>
          </svg>
          <svg class="player-icon-pause" viewBox="0 0 24 24" width="20" height="20">
            <rect x="5" y="3" width="5" height="18" rx="1" fill="currentColor"/>
            <rect x="14" y="3" width="5" height="18" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <div class="player-progress-wrap">
          <div class="player-progress">
            <div class="player-progress-buffered"></div>
            <div class="player-progress-played"></div>
            <div class="player-progress-thumb"></div>
          </div>
        </div>
        <div class="player-time">
          <span class="player-current">0:00</span>
          <span class="player-sep">/</span>
          <span class="player-duration">0:00</span>
        </div>
        <button class="player-volume" aria-label="音量">
          <svg class="player-icon-volume-on" viewBox="0 0 24 24" width="16" height="16">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none"/>
          </svg>
          <svg class="player-icon-volume-off" viewBox="0 0 24 24" width="16" height="16">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor"/>
            <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2"/>
            <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>

      <div class="song-footer">
        <button class="lyrics-toggle">
          <span class="lyrics-toggle-icon">
            <svg viewBox="0 0 12 12" width="10" height="10">
              <line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/>
              <line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/>
            </svg>
          </span>
          <span class="lyrics-toggle-text">歌词</span>
        </button>
        <span class="song-duration-mono"></span>
      </div>

      <div class="lyrics-content"></div>
    </div>
  </article>
</template>

<script>
(function() {
  'use strict';

  let activePlayer = null;

  function formatTime(sec) {
    if (isNaN(sec) || sec < 0) return '0:00';
    var m = Math.floor(sec / 60);
    var s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  function initPlayer(article, song) {
    var playerEl = article.querySelector('.player');
    var audioUrl = 'https://audio.ainovalife.com/' + song.file;
    playerEl.dataset.audioUrl = audioUrl;

    var audio = new Audio();
    audio.preload = 'metadata';

    var playBtn = playerEl.querySelector('.player-play');
    var iconPlay = playerEl.querySelector('.player-icon-play');
    var iconPause = playerEl.querySelector('.player-icon-pause');
    var progressWrap = playerEl.querySelector('.player-progress-wrap');
    var progressPlayed = playerEl.querySelector('.player-progress-played');
    var progressBuffered = playerEl.querySelector('.player-progress-buffered');
    var progressThumb = playerEl.querySelector('.player-progress-thumb');
    var currentEl = playerEl.querySelector('.player-current');
    var durationEl = playerEl.querySelector('.player-duration');
    var volumeBtn = playerEl.querySelector('.player-volume');
    var iconVolOn = playerEl.querySelector('.player-icon-volume-on');
    var iconVolOff = playerEl.querySelector('.player-icon-volume-off');

    audio.volume = 0.75;
    var isDragging = false;

    function setPlaying(state) {
      iconPlay.style.display = state ? 'none' : 'block';
      iconPause.style.display = state ? 'block' : 'none';
      if (state) {
        playBtn.classList.add('is-playing');
        article.classList.add('is-playing');
      } else {
        playBtn.classList.remove('is-playing');
        article.classList.remove('is-playing');
      }
    }

    function updateProgress() {
      if (!audio.duration) return;
      var pct = (audio.currentTime / audio.duration) * 100;
      progressPlayed.style.width = pct + '%';
      progressThumb.style.left = pct + '%';
      currentEl.textContent = formatTime(audio.currentTime);
    }

    playBtn.addEventListener('click', function() {
      if (activePlayer && activePlayer !== audio) {
        activePlayer.pause();
        setPlaying.call(
          { playerEl: activePlayer._el, article: activePlayer._article },
          false
        );
      }

      if (audio.paused || !audio.src) {
        if (!audio.src) audio.src = audioUrl;
        audio.play().catch(function() {});
        activePlayer = audio;
        audio._el = playerEl;
        audio._article = article;
      } else {
        audio.pause();
        activePlayer = null;
      }
    });

    audio.addEventListener('play', function() { setPlaying(true); });
    audio.addEventListener('pause', function() { setPlaying(false); });
    audio.addEventListener('ended', function() { setPlaying(false); activePlayer = null; });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', function() {
      durationEl.textContent = formatTime(audio.duration);
    });
    audio.addEventListener('progress', function() {
      if (audio.buffered.length > 0 && audio.duration) {
        var pct = (audio.buffered.end(audio.buffered.length - 1) / audio.duration) * 100;
        if (isFinite(pct)) progressBuffered.style.width = pct + '%';
      }
    });

    function seek(e) {
      var rect = progressWrap.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      if (audio.duration) {
        audio.currentTime = pct * audio.duration;
        updateProgress();
      }
    }

    progressWrap.addEventListener('mousedown', function(e) {
      isDragging = true;
      seek(e);
      document.addEventListener('mousemove', seek);
      document.addEventListener('mouseup', stopDrag);
    });

    function stopDrag() {
      isDragging = false;
      document.removeEventListener('mousemove', seek);
      document.removeEventListener('mouseup', stopDrag);
    }

    progressWrap.addEventListener('touchstart', function(e) {
      isDragging = true;
      seekTouch(e);
      document.addEventListener('touchmove', seekTouch);
      document.addEventListener('touchend', stopDragTouch);
    });

    function seekTouch(e) {
      var rect = progressWrap.getBoundingClientRect();
      var pct = Math.max(0, Math.min(1, (e.touches[0].clientX - rect.left) / rect.width));
      if (audio.duration) {
        audio.currentTime = pct * audio.duration;
        updateProgress();
      }
    }

    function stopDragTouch() {
      isDragging = false;
      document.removeEventListener('touchmove', seekTouch);
      document.removeEventListener('touchend', stopDragTouch);
    }

    volumeBtn.addEventListener('click', function() {
      if (audio.volume > 0) {
        audio.volume = 0;
        iconVolOn.style.display = 'none';
        iconVolOff.style.display = 'block';
      } else {
        audio.volume = 0.75;
        iconVolOn.style.display = 'block';
        iconVolOff.style.display = 'none';
      }
    });

    playerEl.addEventListener('mouseenter', function() {
      progressThumb.style.opacity = '1';
    });
    playerEl.addEventListener('mouseleave', function() {
      if (!isDragging) progressThumb.style.opacity = '0';
    });
  }

  async function loadSongs() {
    var list = document.getElementById('song-list');
    var tpl = document.getElementById('song-template');

    try { var res = await fetch('/songs.json'); } catch(e) {
      list.innerHTML = '<p class="error">Failed to load songs.</p>';
      return;
    }
    var songs = await res.json();
    list.innerHTML = '';

    songs.forEach(function(song, i) {
      var card = tpl.content.cloneNode(true);
      var article = card.querySelector('.song');
      article.dataset.index = i;

      article.querySelector('.song-number').textContent = String(i + 1).padStart(2, '0');
      article.querySelector('.song-title').textContent = song.title;
      article.querySelector('.song-style').textContent = song.style;
      article.querySelector('.song-desc').textContent = song.description || '';
      article.querySelector('.song-duration-mono').textContent = song.duration || '';
      article.querySelector('.player-duration').textContent = song.duration || '0:00';

      var lyricsDiv = article.querySelector('.lyrics-content');
      var toggleBtn = article.querySelector('.lyrics-toggle');
      var toggleIcon = toggleBtn.querySelector('.lyrics-toggle-icon');
      var toggleText = toggleBtn.querySelector('.lyrics-toggle-text');

      if (song.lyrics && song.lyrics.trim()) {
        lyricsDiv.innerHTML = song.lyrics.replace(/\n/g, '<br>');
        toggleBtn.addEventListener('click', function() {
          var open = lyricsDiv.classList.toggle('open');
          toggleIcon.classList.toggle('is-open', open);
          toggleText.textContent = open ? '收起' : '歌词';
        });
      } else {
        toggleBtn.style.display = 'none';
      }

      list.appendChild(card);
      initPlayer(article, song);
    });

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

      document.querySelectorAll('.song').forEach(function(el) {
        observer.observe(el);
      });
    } else {
      document.querySelectorAll('.song').forEach(function(el) {
        el.classList.add('visible');
      });
    }
  }

  loadSongs();

  // Parallax on hero background
  document.addEventListener('mousemove', function(e) {
    var x = (e.clientX / window.innerWidth - 0.5) * 10;
    var y = (e.clientY / window.innerHeight - 0.5) * 10;
    var heroBg = document.querySelector('.hero-bg');
    if (heroBg) heroBg.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
  });

  // Smooth scroll to songs on scroll indicator click
  document.querySelector('.hero-scroll').addEventListener('click', function() {
    var container = document.querySelector('.container');
    if (container) container.scrollIntoView({ behavior: 'smooth' });
  });

  // Fade hero on scroll
  window.addEventListener('scroll', function() {
    var scrollY = window.pageYOffset;
    var hero = document.querySelector('.hero');
    if (hero) {
      var opacity = Math.max(0, 1 - scrollY / (hero.offsetHeight * 0.7));
      hero.style.opacity = Math.min(1, opacity);
    }
  });

})();
</script>

</body>
</html>
