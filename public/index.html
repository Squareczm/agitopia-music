<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James 的音乐小世界</title>
<meta name="description" content="James 的个人音乐作品">
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="paper"></div>

<div class="container">

<header class="hero">
  <div class="hero-line"></div>
  <h1 class="hero-name">James</h1>
  <p class="hero-sub">音乐小世界</p>
</header>

<main id="song-list">
  <div class="loading">Loading</div>
</main>

<footer class="footer"></footer>

</div>

<template id="song-template">
  <article class="song">
    <span class="song-num"></span>
    <div class="song-main">
      <header class="song-head">
        <h2 class="song-title"></h2>
        <span class="song-tag"></span>
      </header>
      <p class="song-desc"></p>

      <div class="player">
        <button class="player-btn" aria-label="播放/暂停">
          <svg class="player-icon-play" viewBox="0 0 24 24" width="18" height="18"><polygon points="7,4 19,12 7,20"/></svg>
          <svg class="player-icon-pause" viewBox="0 0 24 24" width="18" height="18"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
        </button>
        <div class="player-bar-wrap">
          <div class="player-bar">
            <div class="player-bar-buf"></div>
            <div class="player-bar-pos"></div>
          </div>
        </div>
        <span class="player-time"></span>
      </div>

      <div class="song-foot">
        <button class="lyric-btn">歌词</button>
        <span class="song-len"></span>
      </div>

      <div class="lyric-body"></div>
    </div>
  </article>
</template>

<script>
(function() {
  'use strict';

  var currentAudio = null;

  function pad(n) { return n < 10 ? '0' + n : n; }
  function fmt(sec) {
    if (isNaN(sec) || sec < 0) return '0:00';
    return Math.floor(sec / 60) + ':' + pad(Math.floor(sec % 60));
  }

  function bind(el, song) {
    var audio = new Audio();
    audio.preload = 'metadata';
    var url = 'https://audio.ainovalife.com/' + song.file;

    var btn = el.querySelector('.player-btn');
    var icoPlay = el.querySelector('.player-icon-play');
    var icoPause = el.querySelector('.player-icon-pause');
    var barWrap = el.querySelector('.player-bar-wrap');
    var barPos = el.querySelector('.player-bar-pos');
    var barBuf = el.querySelector('.player-bar-buf');
    var timeEl = el.querySelector('.player-time');

    var dragging = false;

    function setPlay(on) {
      icoPlay.style.display = on ? 'none' : 'block';
      icoPause.style.display = on ? 'block' : 'none';
      btn.classList.toggle('on', on);
      el.classList.toggle('playing', on);
    }

    function tick() {
      if (!audio.duration) return;
      barPos.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
    }

    btn.addEventListener('click', function() {
      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        currentAudio._set(false);
      }
      if (audio.paused || !audio.src) {
        if (!audio.src) audio.src = url;
        audio.play().catch(function(){});
        currentAudio = audio;
        audio._set = setPlay;
      } else {
        audio.pause();
        currentAudio = null;
      }
    });

    audio.addEventListener('play', function() { setPlay(true); });
    audio.addEventListener('pause', function() { setPlay(false); });
    audio.addEventListener('ended', function() { setPlay(false); currentAudio = null; });
    audio.addEventListener('timeupdate', tick);
    audio.addEventListener('loadedmetadata', function() {
      timeEl.textContent = '0:00 / ' + fmt(audio.duration);
    });
    audio.addEventListener('progress', function() {
      if (audio.buffered.length && audio.duration) {
        var p = audio.buffered.end(audio.buffered.length - 1) / audio.duration * 100;
        if (isFinite(p)) barBuf.style.width = p + '%';
      }
    });

    function seek(e) {
      var r = barWrap.getBoundingClientRect();
      var p = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
      if (audio.duration) { audio.currentTime = p * audio.duration; tick(); }
    }

    barWrap.addEventListener('mousedown', function(e) {
      dragging = true; seek(e);
      document.addEventListener('mousemove', seek);
      document.addEventListener('mouseup', function() {
        dragging = false;
        document.removeEventListener('mousemove', seek);
      }, { once: true });
    });

    barWrap.addEventListener('touchstart', function(e) {
      dragging = true; seek(e.touches[0]);
      document.addEventListener('touchmove', function(ev) { seek(ev.touches[0]); });
      document.addEventListener('touchend', function() {
        dragging = false;
      }, { once: true });
    });
  }

  async function init() {
    var list = document.getElementById('song-list');
    var tpl = document.getElementById('song-template');

    try { var res = await fetch('/songs.json'); } catch(e) {
      list.innerHTML = '<p class="error">加载失败</p>'; return;
    }
    var songs = await res.json();
    list.innerHTML = '';

    songs.forEach(function(s, i) {
      var card = tpl.content.cloneNode(true);
      var el = card.querySelector('.song');

      el.querySelector('.song-num').textContent = pad(i + 1);
      el.querySelector('.song-title').textContent = s.title;
      el.querySelector('.song-tag').textContent = s.style;
      el.querySelector('.song-desc').textContent = s.description || '';
      el.querySelector('.song-len').textContent = s.duration || '';

      var lyricBody = el.querySelector('.lyric-body');
      var lyricBtn = el.querySelector('.lyric-btn');

      if (s.lyrics && s.lyrics.trim()) {
        lyricBody.innerHTML = s.lyrics.replace(/\n/g, '<br>');
        lyricBtn.addEventListener('click', function() {
          var open = lyricBody.classList.toggle('open');
          lyricBtn.textContent = open ? '收起' : '歌词';
          lyricBtn.classList.toggle('on', open);
        });
      } else {
        lyricBtn.style.display = 'none';
      }

      list.appendChild(card);
      bind(el, s);
    });

    // Scroll reveal
    if ('IntersectionObserver' in window) {
      var obs = new IntersectionObserver(function(es) {
        es.forEach(function(e) { if (e.isIntersecting) e.target.classList.add('in'); });
      }, { threshold: 0.15, rootMargin: '0px 0px -30px 0px' });
      document.querySelectorAll('.song').forEach(function(s) { obs.observe(s); });
    } else {
      document.querySelectorAll('.song').forEach(function(s) { s.classList.add('in'); });
    }
  }

  init();

  // Subtle paper depth shift
  document.addEventListener('mousemove', function(e) {
    var x = (e.clientX / window.innerWidth - 0.5) * 3;
    var y = (e.clientY / window.innerHeight - 0.5) * 3;
    var paper = document.querySelector('.paper');
    if (paper) paper.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
  });
})();
</script>

</body>
</html>
