<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Cheng · Music</title>
<meta name="description" content="James Cheng 的个人音乐作品">
<meta property="og:title" content="James Cheng · Music">
<link rel="stylesheet" href="styles.css">
<!-- plyr removed for debugging -->
</head>
<body>

<div class="container">

<header class="site-header">
  <h1>James <span class="muted">Cheng</span></h1>
  <p class="tagline">音乐作品</p>
</header>

<main id="song-list">
</main>

<footer class="site-footer">
  <p>&copy; 2026 James Cheng</p>
</footer>

</div>

<template id="song-template">
  <article class="song-card">
    <div class="song-cover">
      <div class="cover-placeholder"><span class="cover-char"></span></div>
    </div>
    <div class="song-body">
      <div class="song-meta-top">
        <span class="song-style"></span>
        <span class="song-date"></span>
      </div>
      <h2 class="song-title"></h2>
      <p class="song-subtitle"></p>
      <p class="song-desc"></p>
      <audio controls preload="metadata">
        <source type="audio/mpeg">
      </audio>
      <button class="lyrics-toggle">展开歌词</button>
      <div class="lyrics-content"></div>
      <span class="song-duration"></span>
    </div>
  </article>
</template>

<script>
async function loadSongs() {
  const res = await fetch('/songs.json');
  const songs = await res.json();
  const list = document.getElementById('song-list');
  const tpl = document.getElementById('song-template');

  songs.forEach(song => {
    const card = tpl.content.cloneNode(true);

    card.querySelector('.cover-char').textContent = song.title[0];
    card.querySelector('.song-style').textContent = song.style;
    card.querySelector('.song-date').textContent = song.date;
    card.querySelector('.song-title').textContent = song.title;
    card.querySelector('.song-subtitle').textContent = song.subtitle || '';
    card.querySelector('.song-desc').textContent = song.description || '';

    const audio = card.querySelector('audio');
    audio.querySelector('source').src = `https://audio.ainovalife.com/${song.file}`;
    audio.querySelector('source').type = 'audio/mpeg';

    // Lyrics toggle
    const lyricsDiv = card.querySelector('.lyrics-content');
    const toggleBtn = card.querySelector('.lyrics-toggle');

    if (song.lyrics && song.lyrics.trim()) {
      lyricsDiv.innerHTML = song.lyrics.replace(/\n/g, '<br>');
      toggleBtn.addEventListener('click', () => {
        const open = lyricsDiv.classList.toggle('open');
        toggleBtn.textContent = open ? '收起歌词' : '展开歌词';
      });
    } else {
      toggleBtn.style.display = 'none';
    }

    card.querySelector('.song-duration').textContent = song.duration || '';
    list.appendChild(card);
  });
}

loadSongs();
</script>

</body>
</html>
