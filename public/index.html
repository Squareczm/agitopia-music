<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James 的音乐小世界</title>
<meta name="description" content="James 的个人音乐作品">
<meta property="og:title" content="James 的音乐小世界">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
</head>
<body>

<div class="noise"></div>
<div class="grid-pattern"></div>

<div class="container">

<header class="site-header">
  <div class="logo-mark">J</div>
  <h1>James <span>的音乐小世界</span></h1>
</header>

<main id="song-list"></main>

<footer class="site-footer">
  <span class="dot"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</footer>

</div>

<template id="song-template">
  <article class="song-card">
    <div class="card-inner">
      <div class="card-header">
        <h2 class="song-title"></h2>
        <span class="song-style"></span>
      </div>
      <p class="song-desc"></p>
      <audio class="plyr-player" controls preload="metadata">
        <source type="audio/mpeg">
      </audio>
      <div class="card-footer">
        <button class="lyrics-toggle">
          <span class="toggle-icon">+</span>
          <span class="toggle-text">歌词</span>
        </button>
        <span class="song-duration"></span>
      </div>
      <div class="lyrics-content"></div>
    </div>
  </article>
</template>

<script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.min.js"></script>
<script>
async function loadSongs() {
  const res = await fetch('/songs.json');
  const songs = await res.json();
  const list = document.getElementById('song-list');
  const tpl = document.getElementById('song-template');

  songs.forEach(song => {
    const card = tpl.content.cloneNode(true);

    card.querySelector('.song-title').textContent = song.title;
    card.querySelector('.song-style').textContent = song.style;
    card.querySelector('.song-desc').textContent = song.description || '';
    card.querySelector('.song-duration').textContent = song.duration || '';

    const audio = card.querySelector('audio');
    audio.querySelector('source').src = 'https://audio.ainovalife.com/' + song.file;
    audio.querySelector('source').type = 'audio/mpeg';

    const lyricsDiv = card.querySelector('.lyrics-content');
    const toggleBtn = card.querySelector('.lyrics-toggle');
    const toggleIcon = toggleBtn.querySelector('.toggle-icon');
    const toggleText = toggleBtn.querySelector('.toggle-text');

    if (song.lyrics && song.lyrics.trim()) {
      lyricsDiv.innerHTML = song.lyrics.replace(/\n/g, '<br>');
      toggleBtn.addEventListener('click', () => {
        const open = lyricsDiv.classList.toggle('open');
        toggleIcon.textContent = open ? '−' : '+';
        toggleText.textContent = open ? '收起' : '歌词';
        if (open) toggleBtn.classList.add('active');
        else toggleBtn.classList.remove('active');
      });
    } else {
      toggleBtn.style.display = 'none';
    }

    list.appendChild(card);
  });

  if (typeof Plyr !== 'undefined') {
    document.querySelectorAll('.plyr-player').forEach(el => {
      new Plyr(el, {
        controls: ['play', 'progress', 'current-time', 'duration', 'volume'],
        preload: 'metadata'
      });
    });
  }
}

loadSongs();

// Subtle parallax on mouse move
document.addEventListener('mousemove', e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 4;
  const y = (e.clientY / window.innerHeight - 0.5) * 4;
  document.querySelector('.grid-pattern').style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
